<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekklesia – Justice et Paix s'embrassent</title>
    <style>
        body { font-family: Georgia, serif; background: #faf9f7; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 2rem; border-radius: 16px; }
        h1 { color: #4a3b2c; text-align: center; }
        .sous-titre { text-align: center; color: #7a6b5a; font-style: italic; margin-bottom: 2rem; }
        textarea, input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        button { background: #4a6f5e; color: white; padding: 10px 20px; border: none; border-radius: 40px; cursor: pointer; font-size: 1rem; }
        .reponse-card { background: #fefaf5; padding: 15px; border-left: 4px solid #4a6f5e; margin-top: 20px; line-height: 1.5; }
        .loading { text-align: center; color: #4a6f5e; margin-top: 20px; }
        .invitation { background: #f0ede8; padding: 12px; border-radius: 12px; margin: 15px 0; font-style: italic; color: #4a3b2c; }
        .citation { margin: 10px 0; padding-left: 15px; border-left: 2px solid #c4b8a8; font-style: italic; color: #6b5e4e; }
        .sagesse { background: #faf6ef; padding: 12px; border-radius: 12px; margin: 10px 0; }
        .ressources { background: #f0f2f5; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 0.9rem; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #aaa39a; }
    </style>
</head>
<body>
<div class="container">
    <h1>⛪ Ekklesia</h1>
    <div class="sous-titre">Justice et Paix s'embrassent</div>

    <textarea id="situation" rows="6" placeholder="Décrivez votre situation, votre question, votre recherche de sens..."></textarea>
    <input type="text" id="role" placeholder="Qui êtes-vous ? (optionnel)">
    <button id="submitBtn">Recevoir une aide au discernement →</button>

    <div id="reponse" class="reponse-card" style="display:none;"></div>
    <div id="loading" class="loading" style="display:none;">🕯️ Un instant...</div>

    <footer>🔒 Rien n'est enregistré · 🕊️ Un compagnon silencieux</footer>
</div>

<script>
document.getElementById('submitBtn').onclick = function() {
    const situation = document.getElementById('situation').value.trim();
    const roleInput = document.getElementById('role').value.trim();
    
    if (!situation) {
        alert("Veuillez décrire votre situation.");
        return;
    }
    
    const reponseDiv = document.getElementById('reponse');
    const loadingDiv = document.getElementById('loading');
    
    loadingDiv.style.display = 'block';
    reponseDiv.style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
    
    setTimeout(() => {
        const lowerSituation = situation.toLowerCase();
        
        // === DÉTECTION DU THÈME ===
        let theme = "";
        let questionSpecifique = "";
        let conseilSpecifique = "";
        
        // Citations Jésus
        let citationJesus = "";
        
        // Magistère (Papes, Catéchisme)
        let citationMagistere = "";
        let referenceCEC = "";
        
        // Psychologie
        let citationPsycho = "";
        let auteurPsycho = "";
        
        // Justice et droit
        let citationJustice = "";
        let referenceDroit = "";
        
        // === FIN DE VIE / EUTHANASIE ===
        if (lowerSituation.includes("amm") || lowerSituation.includes("euthanasie") || lowerSituation.includes("aide médicale à mourir") || lowerSituation.includes("mourir") || lowerSituation.includes("fin de vie")) {
            theme = "une question de fin de vie";
            questionSpecifique = "Quelle est votre place dans cette situation ? Que pouvez-vous faire, sans vous trahir, sans abandonner ?";
            conseilSpecifique = "Il n'y a pas de bonne ou de mauvaise réponse universelle. Votre présence, votre écoute, votre humanité – c'est souvent cela qui compte le plus.";
            citationJesus = "« Aujourd'hui, tu seras avec moi dans le Paradis. » (Luc 23,43) – La miséricorde va plus loin que nos limites.";
            citationMagistere = "« La vie humaine est sacrée dès son commencement. » – Catéchisme de l'Église catholique (CEC 2258) / Pape François : « La miséricorde est le nom de Dieu. »";
            referenceCEC = "CEC 2258-2279 : Respect de la vie humaine, refus de l'euthanasie, soins palliatifs.";
            citationPsycho = "« L'écoute inconditionnelle permet à l'autre de se reconstruire, même dans l'épreuve de la mort. » – Carl Rogers";
            auteurPsycho = "Carl Rogers (psychologie humaniste)";
            citationJustice = "« Droit à la vie, à la liberté et à la sécurité. » – Charte canadienne des droits et libertés / Déclaration universelle des droits de l'homme (art. 3)";
            referenceDroit = "Loi sur l'AMM (Canada, 2016) : clause de conscience pour les soignants / Arrêt Carter c. Canada (2015)";
        }
        // === DEUIL / PERTE ===
        else if (lowerSituation.includes("deuil") || lowerSituation.includes("mort") || lowerSituation.includes("perte") || lowerSituation.includes("disparition")) {
            theme = "un deuil ou une perte";
            questionSpecifique = "Quel est votre plus grand besoin aujourd'hui : être écouté, pleurer, parler, vous souvenir ?";
            conseilSpecifique = "Le deuil prend le temps qu'il prend. Ne vous forcez pas à 'aller bien'. Votre chagrin est légitime.";
            citationJesus = "« Heureux les affligés, car ils seront consolés. » (Matthieu 5,4)";
            citationMagistere = "« La mort n'est pas la fin, mais un passage. » – Benoît XVI / « La résurrection du Christ est notre espérance. » – Pape François";
            referenceCEC = "CEC 1680-1690 : Les funérailles chrétiennes, l'espérance de la résurrection.";
            citationPsycho = "« Le deuil est le prix de l'amour. » – Elisabeth Kübler-Ross / « Il n'y a pas de deuil sans amour. » – Jean Vanier";
            auteurPsycho = "Elisabeth Kübler-Ross (psychiatre, pionnière des soins palliatifs)";
            citationJustice = "« Droit au respect de la vie privée et familiale. » – Charte canadienne / « Droit à la dignité dans la mort. » – Déclaration universelle";
            referenceDroit = "Loi sur les successions / Congé de deuil au Canada (normes du travail)";
        }
        // === DOUTE / QUESTION DE SENS ===
        else if (lowerSituation.includes("doute") || lowerSituation.includes("question") || lowerSituation.includes("pourquoi") || lowerSituation.includes("sens") || lowerSituation.includes("croire")) {
            theme = "une question de sens ou une quête spirituelle";
            questionSpecifique = "Qu'est-ce que vous cherchez vraiment ? Une réponse, une présence, un apaisement ?";
            conseilSpecifique = "Le doute n'est pas une faiblesse. Il est souvent le signe que vous cherchez sincèrement. C'est un chemin, pas une impasse.";
            citationJesus = "« Cherchez et vous trouverez. » (Matthieu 7,7)";
            citationMagistere = "« Comprends pour croire, crois pour comprendre. » – Saint Augustin / « La foi n'est pas une opinion, c'est une rencontre. » – Benoît XVI";
            referenceCEC = "CEC 150-165 : La foi, réponse libre de l'homme à Dieu.";
            citationPsycho = "« Le doute est le compagnon de route de la foi. » – Paul Ricoeur / « La crise est une opportunité de croissance. » – Erik Erikson";
            auteurPsycho = "Erik Erikson (psychologie du développement) / Paul Ricoeur (philosophie de l'interprétation)";
            citationJustice = "« Liberté de conscience et de religion. » – Charte canadienne (art. 2) / Déclaration universelle (art. 18)";
            referenceDroit = "Droit à la liberté de pensée, de conscience et de religion (jurisprudence)";
        }
        // === SOUFFRANCE / MALADIE ===
        else if (lowerSituation.includes("maladie") || lowerSituation.includes("souffrance") || lowerSituation.includes("douleur") || lowerSituation.includes("handicap")) {
            theme = "la maladie ou la souffrance";
            questionSpecifique = "Comment vivez-vous cette épreuve ? Qu'est-ce qui vous aide à tenir ?";
            conseilSpecifique = "La souffrance isole. Cherchez une présence, une parole, un geste. Vous n'êtes pas obligé(e) de porter cela seul(e).";
            citationJesus = "« Venez à moi, vous tous qui peinez et ployez sous le fardeau, et je vous donnerai le repos. » (Matthieu 11,28)";
            citationMagistere = "« La souffrance est un mystère qui devient fécond par l'amour. » – Jean-Paul II (Salvifici Doloris) / « Offrir sa souffrance, c'est la transformer en amour. » – Charles de Foucauld";
            referenceCEC = "CEC 1500-1510 : La maladie dans la vie chrétienne, sens de la souffrance.";
            citationPsycho = "« La souffrance non reconnue devient destructrice. » – Carl Jung / « La vulnérabilité est la source du courage. » – Brené Brown";
            auteurPsycho = "Carl Jung (psychanalyse) / Brené Brown (vulnérabilité et honte)";
            citationJustice = "« Droit à l'égalité sans discrimination fondée sur le handicap. » – Charte canadienne (art. 15) / Convention relative aux droits des personnes handicapées (ONU)";
            referenceDroit = "Loi sur l'équité en matière d'emploi / Loi sur l'accessibilité (Canada)";
        }
        // === CONFLIT ===
        else if (lowerSituation.includes("conflit") || lowerSituation.includes("dispute") || lowerSituation.includes("brouille") || lowerSituation.includes("tension")) {
            theme = "un conflit relationnel";
            questionSpecifique = "Qu'est-ce qui est le plus important pour vous : avoir raison, ou retrouver la paix ?";
            conseilSpecifique = "Parfois, un petit geste suffit. Une main tendue, un silence, un pardon même silencieux.";
            citationJesus = "« Heureux les artisans de paix, car ils seront appelés fils de Dieu. » (Matthieu 5,9)";
            citationMagistere = "« La paix n'est pas l'absence de conflit, mais la présence de justice. » – Pape Paul VI / « Le pardon est le souffle de Dieu. » – Pape François";
            referenceCEC = "CEC 2302-2306 : Le respect de la paix et l'évitement des conflits.";
            citationPsycho = "« Le conflit non résolu grandit dans le silence. » – Virginia Satir / « L'écoute active est la clé de la résolution. » – Thomas Gordon";
            auteurPsycho = "Virginia Satir (thérapie familiale) / Thomas Gordon (communication non violente)";
            citationJustice = "« Droit à la sécurité de la personne. » – Charte canadienne / « Droit à un recours effectif. » – Déclaration universelle (art. 8)";
            referenceDroit = "Médiation judiciaire / Lois sur la prévention de la violence familiale";
        }
        // === TRAVAIL / CARRIÈRE ===
        else if (lowerSituation.includes("travail") || lowerSituation.includes("emploi") || lowerSituation.includes("licenciement") || lowerSituation.includes("carrière")) {
            theme = "une situation professionnelle";
            questionSpecifique = "Votre valeur se réduit-elle à votre travail ? Que voudriez-vous préserver, quoi qu'il arrive ?";
            conseilSpecifique = "Un emploi se perd ou se trouve. Votre dignité, elle, ne dépend pas d'un contrat.";
            citationJesus = "« Ne vous inquiétez pas pour demain. » (Matthieu 6,34)";
            citationMagistere = "« Le travail est pour l'homme, non l'homme pour le travail. » – Jean-Paul II (Laborem Exercens) / « La dignité du travailleur est sacrée. » – Pape François";
            referenceCEC = "CEC 2427-2428 : Le travail dans la doctrine sociale de l'Église.";
            citationPsycho = "« Le sentiment d'être utile donne un sens à la vie. » – Viktor Frankl / « L'épuisement professionnel vient de l'absence de reconnaissance. » – Christophe Dejours";
            auteurPsycho = "Viktor Frankl (logothérapie) / Christophe Dejours (psychodynamique du travail)";
            citationJustice = "« Droit au travail, à des conditions équitables. » – Déclaration universelle (art. 23) / « Droit à la non-discrimination en matière d'emploi. » – Charte canadienne";
            referenceDroit = "Normes du travail (congés, préavis de licenciement) / Loi sur l'équité salariale";
        }
        // === COUPLE / AMOUR ===
        else if (lowerSituation.includes("couple") || lowerSituation.includes("mariage") || lowerSituation.includes("amour") || lowerSituation.includes("divorce") || lowerSituation.includes("séparation")) {
            theme = "une situation amoureuse ou conjugale";
            questionSpecifique = "Dans cette relation, qu'est-ce qui vous nourrit ? Qu'est-ce qui vous épuise ?";
            conseilSpecifique = "L'amour vrai ne fait pas souffrir gratuitement. Parfois, prendre du recul est nécessaire. Parfois, se rapprocher aussi.";
            citationJesus = "« Ce que Dieu a uni, que l'homme ne le sépare pas. » (Marc 10,9)";
            citationMagistere = "« L'amour humain participe à l'amour de Dieu. » – Jean-Paul II (Familiaris Consortio) / « Le mariage est une vocation à la sainteté. » – Pape François";
            referenceCEC = "CEC 1601-1666 : Le sacrement du mariage, l'amour conjugal.";
            citationPsycho = "« L'amour est une décision, pas seulement un sentiment. » – Gary Chapman / « Les blessures de l'enfance se rejouent en couple. » – John Bowlby (théorie de l'attachement)";
            auteurPsycho = "Gary Chapman (langages de l'amour) / John Bowlby (attachement)";
            citationJustice = "« Droit au respect de la vie privée et familiale. » – Charte canadienne / « Droit à l'égalité dans le mariage. » – Loi sur le mariage civil";
            referenceDroit = "Loi sur le divorce (Canada) / Médiation familiale / Pension alimentaire";
        }
        // === FAMILLE / ÉDUCATION ===
        else if (lowerSituation.includes("enfant") || lowerSituation.includes("parent") || lowerSituation.includes("famille") || lowerSituation.includes("éducation")) {
            theme = "une question familiale ou éducative";
            questionSpecifique = "Quel est votre plus grand souhait pour cette personne qui vous est chère ?";
            conseilSpecifique = "L'amour ne se prouve pas par la perfection, mais par la présence, la patience, l'écoute.";
            citationJesus = "« Laissez les petits enfants venir à moi. » (Marc 10,14)";
            citationMagistere = "« Les parents sont les premiers éducateurs de leurs enfants. » – Concile Vatican II (Gravissimum Educationis) / « Chaque enfant est un don de Dieu. » – Pape François";
            referenceCEC = "CEC 2221-2231 : Les devoirs des parents, l'éducation des enfants.";
            citationPsycho = "« L'enfant a besoin de se sentir aimé inconditionnellement. » – Carl Rogers / « Les limites sont aussi importantes que l'affection. » – Dolto / Winnicott : « Un enfant a besoin de présence. »";
            auteurPsycho = "Françoise Dolto (psychanalyse) / Donald Winnicott (pédiatrie)";
            citationJustice = "« Droit à la protection de l'enfant. » – Convention internationale des droits de l'enfant (ONU) / « Droit à l'éducation. » – Déclaration universelle (art. 26)";
            referenceDroit = "Loi sur la protection de la jeunesse / Autorité parentale / Droit de garde";
        }
        // === INJUSTICE ===
        else if (lowerSituation.includes("injustice") || lowerSituation.includes("discrimination") || lowerSituation.includes("violence")) {
            theme = "une injustice subie ou témoignée";
            questionSpecifique = "Que pouvez-vous faire, à votre échelle, sans vous mettre en danger ?";
            conseilSpecifique = "Une petite action vaut mieux qu'une grande indignation silencieuse. Parfois, témoigner, c'est déjà agir.";
            citationJesus = "« Heureux ceux qui ont faim et soif de justice. » (Matthieu 5,6)";
            citationMagistere = "« La justice sans la miséricorde est une cruauté. » – Saint Augustin / « La doctrine sociale de l'Église est une éthique de la justice. » – Pape Benoît XVI";
            referenceCEC = "CEC 1928-1948 : La justice sociale, le bien commun, la solidarité.";
            citationPsycho = "« L'injustice répétée détruit la santé mentale. » – Ignacio Martín-Baró / « La honte est la marque des victimes d'injustice. » – Brené Brown";
            auteurPsycho = "Ignacio Martín-Baró (psychologie de la libération) / Brené Brown (vulnérabilité)";
            citationJustice = "« Droit à l'égalité sans discrimination. » – Charte canadienne (art. 15) / « Droit à la justice et à un recours effectif. » – Déclaration universelle (art. 8, 10)";
            referenceDroit = "Loi canadienne sur les droits de la personne / Recours collectifs / Accès à l'aide juridique";
        }
        // === GÉNÉRIQUE ===
        else {
            theme = "une situation difficile";
            questionSpecifique = "Qu'est-ce qui serait, pour vous, un premier pas possible, même tout petit ?";
            conseilSpecifique = "Prenez une respiration. Une chose à la fois. Vous n'êtes pas obligé(e) de tout résoudre aujourd'hui.";
            citationJesus = "« Je suis le chemin, la vérité et la vie. » (Jean 14,6)";
            citationMagistere = "« La dignité humaine est le fondement de tous les droits. » – Catéchisme (CEC 1700-1706) / Pape François : « La vie est un don, pas une possession. »";
            referenceCEC = "CEC 1700-1715 : La dignité de la personne humaine, la liberté, la conscience.";
            citationPsycho = "« Ce qui compte, c'est le sens qu'on donne à ce qui nous arrive. » – Viktor Frankl / « La voie du milieu est celle de la sagesse. » – Carl Jung";
            auteurPsycho = "Viktor Frankl (logothérapie) / Carl Jung (psychanalyse)";
            citationJustice = "« Tous les êtres humains naissent libres et égaux en dignité et en droits. » – Déclaration universelle (art. 1)";
            referenceDroit = "Charte canadienne des droits et libertés / Droit à la vie privée / Droit à la sécurité de la personne";
        }
        
        let identite = roleInput ? `Vous vous présentez comme ${roleInput}.` : "Vous êtes une personne en recherche, en questionnement, en chemin.";
        
        // === GÉNÉRATION DE LA RÉPONSE ===
        let reponse = `
            <div class="invitation">
                🌱 « Avant toute recherche, accueille-toi toi-même. Tu as le droit d'être là, avec tes fragilités, tes doutes, tes blessures. » <em>– Jean Monbourquette</em>
            </div>
            
            <strong>1. Accueillons ce que vous vivez</strong><br><br>
            ${identite}<br>
            Vous traversez actuellement ${theme}. Voici ce que vous avez partagé :<br>
            <em>« ${situation.substring(0, 200)}${situation.length > 200 ? '...' : ''} »</em><br><br>
            Cette situation est réelle, et elle vous pèse. C'est normal. Vous n'êtes ni faible ni anormal pour ressentir cela.<br><br>
            
            <div class="citation">
                ✝️ ${citationJesus}
            </div>
            
            <strong>2. Prendre le temps de l'écoute intérieure (Maurice Zundel)</strong><br><br>
            <div class="invitation">
                🕯️ « Fais silence en toi. Écoute ce qui émerge du fond de ton être. Là, sans bruit, quelque chose de plus grand cherche à naître. » <em>– Maurice Zundel</em>
            </div>
            Avant de chercher une solution, pose-toi quelques instants. Ferme les yeux si tu le peux. Respire profondément.<br>
            Écoute en toi : qu'est-ce qui est vraiment vivant ? Une émotion, une image, un mot, un silence ?<br>
            Ne juge pas ce qui vient. Accueille-le.<br><br>
            
            <strong>3. Ce qui peut vous bloquer (et comment l'accueillir)</strong><br><br>
            Vous êtes probablement pris(e) entre plusieurs choses : ce que vous voudriez faire, ce que vous pouvez faire, ce que les autres attendent, ce que vous croyez devoir faire.<br>
            Monbourquette nous rappelle : « Tu n'es pas ce que tu fais. Tu es plus grand que tes actes, plus grand que tes chutes. »<br>
            Ne réduis pas ton être à cette situation. Tu as de la valeur, quoi qu'il arrive.<br><br>
            
            <strong>4. Une petite liberté possible</strong><br><br>
            ${conseilSpecifique}<br><br>
            Il y a toujours un petit espace de liberté, même minuscule. Une parole qu'on n'a pas encore dite, un silence qu'on n'a pas encore pris, un geste qu'on n'a pas encore osé.<br><br>
            
            <strong>5. Le pas juste pour vous</strong><br><br>
            Ni tout subir, ni tout rejeter. Ni se sacrifier, ni abandonner les autres. Le chemin juste est souvent entre deux extrêmes.<br>
            Posez-vous cette question, sans vous presser :<br>
            <em>« ${questionSpecifique} »</em><br><br>
            
            <strong>6. Une action minuscule pour aujourd'hui (Zundel – le déploiement)</strong><br><br>
            Zundel disait : « Chaque être est une promesse de Dieu. » Une toute petite chose que vous pouvez faire pour vous déployer, pour être plus vous-même aujourd'hui :<br>
            ▸ Écrire ce qui vous pèse (sur un papier, dans un coin)<br>
            ▸ Parler à une personne de confiance (même un message)<br>
            ▸ Prendre cinq minutes de silence, sans écran, sans rien<br>
            ▸ Faire un geste simple pour vous-même (marcher, respirer, boire un thé)<br>
            ▸ Relire cette réponse dans quelques jours – parfois, le sens vient lentement<br><br>
            
            <strong>7. Une parole d'espérance</strong><br><br>
            Monbourquette : « Tu es aimé, non pas parce que tu es parfait, mais parce que tu es toi. »<br>
            Zundel : « Dieu n'attend pas ta perfection, il attend ton cœur. »<br><br>
            Vous n'êtes pas seul(e). La vie est plus forte que ce qui vous arrive aujourd'hui.<br>
            Et même dans l'incertitude, il y a une lumière – parfois juste au fond de vous, parfois chez quelqu'un d'autre, parfois dans un geste simple.<br><br>
            
            <div class="ressources">
                <strong>📚 Sources d'autorité pour approfondir</strong><br><br>
                
                <strong>✝️ Magistère de l'Église catholique</strong><br>
                ${citationMagistere}<br>
                <em>${referenceCEC}</em><br><br>
                
                <strong>🧠 Psychologie et accompagnement</strong><br>
                « ${citationPsycho} »<br>
                <em>${auteurPsycho}</em><br><br>
                
                <strong>⚖️ Justice et droit</strong><br>
                ${citationJustice}<br>
                <em>${referenceDroit}</em><br><br>
                
                <strong>📖 Pour aller plus loin</strong><br>
                • Parler à un accompagnateur spirituel ou un psychologue<br>
                • Consulter les services d'aide juridique de votre région<br>
                • Lire « La dignité humaine » (Catéchisme, CEC 1700-1715)<br>
                • Lire « Le droit de mourir dans la dignité » (documentation sur les soins palliatifs)
            </div>
            
            <hr>
            <small>📚 Sources spirituelles : Jésus Christ, Saint Augustin, Saint Thomas d'Aquin, Saint Jean de la Croix, Sainte Thérèse de Lisieux, Saint François d'Assise, Benoît XVI, Joseph Kentenich, Charles de Foucauld, Simone Weil, Pères du désert, Pape François, Jean-Paul II, Catéchisme de l'Église catholique.</small><br>
            <small>📚 Sources psychologiques : Carl Rogers, Jean Vanier, Viktor Frankl, Brené Brown, Carl Jung, Erik Erikson, Elisabeth Kübler-Ross, Françoise Dolto, Donald Winnicott.</small><br>
            <small>📚 Sources juridiques : Charte canadienne des droits et libertés, Déclaration universelle des droits de l'homme, Convention internationale des droits de l'enfant, doctrine sociale de l'Église.</small>`;
        
        reponseDiv.innerHTML = reponse;
        reponseDiv.style.display = 'block';
        loadingDiv.style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
    }, 800);
};
</script>
</body>
</html>
