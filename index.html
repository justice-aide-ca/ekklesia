<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekklesia – Justice et Paix s'embrassent</title>
    <style>
        body { font-family: Georgia, serif; background: #faf9f7; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 2rem; border-radius: 16px; }
        h1 { color: #4a3b2c; text-align: center; }
        .sous-titre { text-align: center; color: #7a6b5a; font-style: italic; margin-bottom: 2rem; }
        textarea, input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        button { background: #4a6f5e; color: white; padding: 10px 20px; border: none; border-radius: 40px; cursor: pointer; font-size: 1rem; }
        .reponse-card { background: #fefaf5; padding: 15px; border-left: 4px solid #4a6f5e; margin-top: 20px; line-height: 1.5; }
        .loading { text-align: center; color: #4a6f5e; margin-top: 20px; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #aaa39a; }
    </style>
</head>
<body>
<div class="container">
    <h1>⛪ Ekklesia</h1>
    <div class="sous-titre">Justice et Paix s'embrassent</div>

    <textarea id="situation" rows="6" placeholder="Décrivez votre situation..."></textarea>
    <input type="text" id="role" placeholder="Votre rôle (optionnel) – ex: prêtre, soignant, famille">
    <button id="submitBtn">Recevoir une aide →</button>

    <div id="reponse" class="reponse-card" style="display:none;"></div>
    <div id="loading" class="loading" style="display:none;">🕯️ Un instant...</div>

    <footer>🔒 Rien n'est enregistré · 🕊️ Un compagnon silencieux</footer>
</div>

<script>
// Fonction de réponse personnalisée selon la situation
function getPersonalizedResponse(situation, role) {
    const lowerSituation = situation.toLowerCase();
    
    // Détection du rôle
    let userRole = role || "personne";
    if (lowerSituation.includes("prêtre") || lowerSituation.includes("pretre")) userRole = "prêtre";
    if (lowerSituation.includes("soignant") || lowerSituation.includes("infirmier")) userRole = "soignant";
    if (lowerSituation.includes("famille") || lowerSituation.includes("parent")) userRole = "membre de la famille";
    if (lowerSituation.includes("bénévole")) userRole = "bénévole";
    
    // Détection du sujet
    let sujet = "situation difficile";
    if (lowerSituation.includes("amm") || lowerSituation.includes("euthanasie") || lowerSituation.includes("mourir")) {
        sujet = "l'aide médicale à mourir";
    } else if (lowerSituation.includes("malade") || lowerSituation.includes("hopital")) {
        sujet = "la maladie grave";
    } else if (lowerSituation.includes("conflit") || lowerSituation.includes("désaccord")) {
        sujet = "un conflit relationnel";
    } else if (lowerSituation.includes("doute") || lowerSituation.includes("question")) {
        sujet = "un doute profond";
    }
    
    return `<strong>1. Accueillons votre situation</strong><br><br>
            En tant que ${userRole}, vous êtes confronté(e) à ${sujet}. C'est une situation lourde, et c'est normal que vous vous interrogiez.<br><br>
            
            <strong>2. Ce qui bloque</strong><br><br>
            Vous êtes pris(e) entre plusieurs choses que vous ne contrôlez pas : votre conscience, votre foi, le regard des autres, ou les attentes institutionnelles.<br><br>
            
            <strong>3. Une petite liberté possible</strong><br><br>
            Il y a toujours un petit espace de liberté, même minuscule. Parfois, il suffit d'une présence silencieuse, d'une écoute sans jugement.<br><br>
            
            <strong>4. Le pas juste</strong><br><br>
            Ni tout accepter par peur, ni tout refuser par rigidité. Le chemin juste est souvent entre deux extrêmes. Que dit votre cœur au plus profond ?<br><br>
            
            <strong>5. Action pour aujourd'hui</strong><br><br>
            Une toute petite chose concrète : une parole, un silence, une présence. Ne cherchez pas à tout résoudre d'un coup.<br><br>
            
            <strong>6. Une parole d'espérance</strong><br><br>
            Vous n'êtes pas seul(e). La vie est plus forte que la mort. L'amour est plus fort que tout. Et même dans l'incertitude, il y a une lumière qui ne s'éteint pas.`;
}

document.getElementById('submitBtn').onclick = function() {
    const situation = document.getElementById('situation').value.trim();
    const role = document.getElementById('role').value.trim();
    
    if (!situation) {
        alert("Veuillez décrire votre situation.");
        return;
    }
    
    const reponseDiv = document.getElementById('reponse');
    const loadingDiv = document.getElementById('loading');
    
    loadingDiv.style.display = 'block';
    reponseDiv.style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
    
    setTimeout(() => {
        reponseDiv.innerHTML = getPersonalizedResponse(situation, role);
        reponseDiv.style.display = 'block';
        loadingDiv.style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
    }, 800);
};
</script>
</body>
</html>
