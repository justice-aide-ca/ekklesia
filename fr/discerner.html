<script>
const OPENAI_API_KEY = "sk-proj-VeolI718FDqY_90U2PvLN1G6a21Yoa-tZM4vYt5n01am_Nui4oEinU-BNICLBRYST15Bm48T3B1bKfJXmJV8xdxRDRJYQoLpON-jUBm1PvQYg3eZ6vriq7k6R815ue7BjgdDEuHv9rZhpqdvTtUogC2GcA";
const API_URL = "https://cors-anywhere.herokuapp.com/https://api.openai.com/v1/chat/completions";

const SYSTEM_PROMPT = `Tu es « Ekklesia », un outil catholique d'aide au discernement et à l'action...`;

document.getElementById('submitBtn').onclick = async function() {
    const situation = document.getElementById('situation').value.trim();
    const role = document.getElementById('role').value.trim();
    
    if (!situation) {
        alert("Veuillez décrire votre situation.");
        return;
    }
    
    let userMessage = situation;
    if (role) {
        userMessage = `Mon rôle : ${role}\n\nMa situation : ${situation}`;
    }
    
    const reponseDiv = document.getElementById('reponse');
    const loadingDiv = document.getElementById('loading');
    const errorDiv = document.getElementById('error');
    
    reponseDiv.style.display = 'none';
    errorDiv.style.display = 'none';
    loadingDiv.style.display = 'block';
    document.getElementById('submitBtn').disabled = true;
    
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${OPENAI_API_KEY}`,
                'Origin': 'https://justice-aide-ca.github.io'
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: SYSTEM_PROMPT },
                    { role: "user", content: userMessage }
                ],
                temperature: 0.5,
                max_tokens: 1200
            })
        });
        
        if (!response.ok) {
            throw new Error("Erreur API");
        }
        
        const data = await response.json();
        const reponseTexte = data.choices[0].message.content;
        
        reponseDiv.innerHTML = reponseTexte.replace(/\n/g, '<br><br>');
        reponseDiv.style.display = 'block';
        
    } catch (error) {
        errorDiv.innerHTML = "❌ Une erreur est survenue. Veuillez réessayer plus tard.";
        errorDiv.style.display = 'block';
        console.error(error);
    } finally {
        loadingDiv.style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
    }
};
</script>
